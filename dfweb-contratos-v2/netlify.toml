[build]
  base = "dfweb-contratos-v2"
  command = "npm run build"
  publish = "dfweb-contratos-v2/dist"
  functions = "dfweb-contratos-v2/netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/.netlify/functions/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
